# Usage: docker compose --env-file .env up --build
# Copy .env.example to .env and fill in your values before running.
#
# This PoC demonstrates Workload Identity Federation (WIF) with Entra Agent ID
# to authenticate to Claude via Microsoft Foundry — no Anthropic API key required.
#
# Identity flow:
#   sidecar (client credentials or WIF/SignedAssertionFromManagedIdentity)
#     → Entra ID → Agent Identity token (scope: cognitiveservices.azure.com)
#     → agent uses Bearer token → Claude via Microsoft Foundry

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Microsoft Entra SDK Auth Sidecar
  # Handles all credential work. The agent container never sees secrets.
  # NOTE: No ports exposed to host — per Microsoft security guidance the SDK
  #       API must only be reachable within the same trust boundary.
  # Docs: https://learn.microsoft.com/en-us/entra/msidweb/agent-id-sdk/security
  # ──────────────────────────────────────────────────────────────────────────
  sidecar:
    image: mcr.microsoft.com/entra-sdk/auth-sidecar:1.0.0-azurelinux3.0-distroless
    container_name: claude-wif-sidecar
    environment:
      # ── Entra ID tenant & Blueprint app ────────────────────────────────────
      - AzureAd__Instance=https://login.microsoftonline.com/
      - AzureAd__TenantId=${TENANT_ID}
      - AzureAd__ClientId=${BLUEPRINT_APP_ID}

      # ── Credential source ──────────────────────────────────────────────────
      # LOCAL DEV: client secret (no Azure deployment required).
      # AZURE/WIF: change SourceType to SignedAssertionFromManagedIdentity and
      #            set ManagedIdentityResourceId to your MI resource ID.
      #            That uses the managed identity OIDC assertion as a WIF
      #            client_assertion — no secret ever stored on disk.
      - AzureAd__ClientCredentials__0__SourceType=ClientSecret
      - AzureAd__ClientCredentials__0__ClientSecret=${BLUEPRINT_CLIENT_SECRET}

      # ── Downstream API: Claude via Microsoft Foundry (app-only / autonomous) ─
      # The sidecar exchanges Blueprint credentials for an Agent Identity token
      # scoped to Azure Cognitive Services (cognitiveservices.azure.com).
      # That token is then used by the agent to call Claude via Foundry.
      - DownstreamApis__claude-api__BaseUrl=${FOUNDRY_RESOURCE_BASE_URL}
      - DownstreamApis__claude-api__Scopes__0=https://cognitiveservices.azure.com/.default
      - DownstreamApis__claude-api__RequestAppToken=true

      # ── ASP.NET Core runtime ───────────────────────────────────────────────
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - AllowedHosts=*
    networks:
      - claude-wif-network

  # ──────────────────────────────────────────────────────────────────────────
  # Claude agent
  # Asks the sidecar for an auth header, then calls Claude via Foundry.
  # ──────────────────────────────────────────────────────────────────────────
  agent:
    build: ./agent
    container_name: claude-wif-agent
    ports:
      - "3000:3000"
    environment:
      - SIDECAR_URL=http://sidecar:5000
      - AGENT_APP_ID=${AGENT_CLIENT_ID}
      - FOUNDRY_ENDPOINT=${FOUNDRY_ENDPOINT}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
    depends_on:
      - sidecar
    networks:
      - claude-wif-network

networks:
  claude-wif-network:
    driver: bridge
